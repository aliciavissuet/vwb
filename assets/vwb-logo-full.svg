<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 560" role="img" aria-labelledby="title desc">
  <title id="title">Vision Without Borders Logo</title>
  <desc id="desc">Vision Without Borders wordmark with an eye-globe in Vision and a globe in Borders.</desc>
  <defs>
    <style>
      .word {
        font-family: Inter, Arial, Helvetica, sans-serif;
        font-weight: 900;
        letter-spacing: -0.055em;
      }
      .without {
        fill: #7a7d80;
        font-size: 96px;
        letter-spacing: 0.08em;
      }
      .primary {
        fill: #101010;
        font-size: 168px;
      }
      .mark-line {
        fill: none;
        stroke: #101010;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
    </style>
    <clipPath id="eye-iris-clip">
      <circle cx="92" cy="60" r="30"/>
